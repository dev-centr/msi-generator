name: Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        id: antora
        uses: antora-supplemental/antora-build-action@v2
        with:
          playbook: antora-playbook.yml
          output_dir: public
          install_dependencies: false
          setup_pnpm: false
          setup_node: false
          fetch: true

      # Project Pages root is /msi-generator/; Antora also nests the component
      # under /msi-generator/, so add a root redirect for the canonical docs URL.
      - name: Add Pages root redirect
        run: |
          SITE="${{ steps.antora.outputs.site-path }}"
          printf '%s\n' \
            '<!DOCTYPE html>' \
            '<meta charset="utf-8">' \
            '<meta http-equiv="refresh" content="0; url=msi-generator/">' \
            '<link rel="canonical" href="msi-generator/">' \
            '<title>MSI/MSIX Generator</title>' \
            "<script>location.replace('msi-generator/')</script>" \
            '<p><a href="msi-generator/">MSI/MSIX Generator documentation</a></p>' \
            > "$SITE/index.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ steps.antora.outputs.site-path }}

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
